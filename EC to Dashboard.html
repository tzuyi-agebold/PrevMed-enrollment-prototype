<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold Health Portal - Enrollment Flow</title>
    
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; background-color: #e5e7eb; }
        
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 400px;
            opacity: 1;
        }
        
        .doc-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .doc-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .doc-scroll::-webkit-scrollbar-thumb {
            background-color: #E5E7EB;
            border-radius: 10px;
        }
    </style>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#7C3AED', 
                            lightPurple: '#F3E8FF',
                            yellow: '#FEF3C7',
                            yellowBorder: '#FDE68A',
                            green: '#E6FFFA',
                            text: '#111827',
                            muted: '#6B7280'
                        }
                    },
                    boxShadow: {
                        'card': '0 2px 8px -2px rgba(0, 0, 0, 0.05), 0 4px 12px -2px rgba(0, 0, 0, 0.02)',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        revealIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    },
                    animation: {
                        slideUp: 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        revealIn: 'revealIn 0.6s ease-out forwards'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased text-brand-text flex justify-center pb-12 sm:py-12">

    <div id="root" class="w-full max-w-[400px] bg-[#F9FAFB] min-h-screen sm:rounded-[2.5rem] sm:shadow-2xl overflow-hidden relative border-x sm:border border-gray-200"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Gemini API Configuration
        const apiKey = "";
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        const callGemini = async (prompt, systemInstruction = "") => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) return null;
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return null; }
        };

        // --- Shared Components --- //

        const HipaaFooter = () => (
            <div className="flex items-center gap-3 px-5 py-4">
                <img src="https://www.figma.com/api/mcp/asset/080fdd79-2f7f-4e99-9c1a-d33ae8d172c1" alt="HIPAA Compliant" className="w-11 h-11 shrink-0 object-contain" />
                <p className="text-[14px] text-[#acacac] leading-snug">Bold is HIPAA compliant. Your information is safe and protected.</p>
            </div>
        );

        const Icon = ({ name, className = "", filled = false }) => (
            <span className={`material-symbols-outlined ${filled ? 'icon-filled' : ''} ${className}`}>
                {name}
            </span>
        );

        const Header = ({ onBack, progress, hideBack }) => (
            <div className="sticky top-0 z-50 bg-white relative shrink-0">
                <header className="px-4 py-4 flex items-center border-b border-gray-100">
                    {!hideBack ? (
                        <button onClick={onBack} className="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-50 active:scale-95 transition-all text-gray-600">
                            <Icon name="chevron_left" />
                        </button>
                    ) : (
                        <div className="w-10 h-10"></div>
                    )}
                    <div className="flex-1 text-center pr-10">
                        <h1 className="text-xl font-extrabold italic tracking-wider uppercase">Bold</h1>
                    </div>
                </header>
                {progress > 0 && (
                    <div className="absolute bottom-0 left-0 h-[3px] w-full bg-gray-100">
                        <div className="h-full bg-brand-purple transition-all duration-500 ease-out rounded-r-full" style={{ width: `${progress}%` }}></div>
                    </div>
                )}
            </div>
        );

        const ActionButton = ({ icon, label, onClick }) => (
            <button onClick={onClick} className="flex flex-col items-center gap-1 group">
                <div className="w-12 h-12 rounded-full border border-gray-200 bg-white flex items-center justify-center text-gray-700 group-hover:bg-gray-50 group-active:scale-95 transition-all shadow-sm">
                    <Icon name={icon} />
                </div>
                <span className="text-[12px] text-center text-[#171717] leading-[16px] whitespace-pre-line">{label}</span>
            </button>
        );

        const AccordionItem = ({ question, answer, isOpen, onClick }) => (
            <div className="border-b border-gray-100 last:border-0">
                <button onClick={onClick} className="w-full py-4 px-1 flex justify-between items-center text-left hover:bg-gray-50 transition-colors">
                    <span className="text-sm font-medium text-gray-800 pr-4">{question}</span>
                    <Icon name="expand_more" className={`text-gray-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
                </button>
                <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                    <div className="pb-4 px-1 text-sm text-gray-600">{answer}</div>
                </div>
            </div>
        );

        const ResourceCard = ({ image, category, title, description }) => (
            <div className="bg-white rounded-2xl overflow-hidden shadow-card border border-gray-100 cursor-pointer hover:shadow-md transition-shadow">
                <div className="h-40 w-full overflow-hidden">
                    <img src={image} alt={title} className="w-full h-full object-cover" />
                </div>
                <div className="p-4">
                    <div className="flex items-center gap-1.5 text-xs font-semibold text-blue-600 mb-2">
                        <Icon name="description" className="text-[16px] text-blue-500" />
                        {category}
                    </div>
                    <h3 className="font-bold text-[15px] leading-tight mb-2 text-gray-900">{title}</h3>
                    <p className="text-sm text-gray-500 line-clamp-2">{description}</p>
                </div>
            </div>
        );

        const FooterLink = ({ title }) => (
            <button className="w-full py-4 px-2 flex justify-between items-center text-left border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors group">
                <span className="text-sm font-medium text-gray-800">{title}</span>
                <Icon name="arrow_outward" className="text-gray-400 group-hover:text-gray-900 transition-colors" />
            </button>
        );

        // --- Screens --- //

        const US_STATES = [
            "Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut",
            "Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa",
            "Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan",
            "Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire",
            "New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio",
            "Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota",
            "Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia",
            "Wisconsin","Wyoming"
        ];

        const CoverageScreen = ({ onContinue }) => {
            const [state, setState] = useState('');
            const [dob, setDob] = useState('');
            const [showWhy, setShowWhy] = useState(false);

            const formatDob = (val) => {
                const digits = val.replace(/\D/g, '').slice(0, 8);
                if (digits.length <= 2) return digits;
                if (digits.length <= 4) return `${digits.slice(0,2)}/${digits.slice(2)}`;
                return `${digits.slice(0,2)}/${digits.slice(2,4)}/${digits.slice(4)}`;
            };

            const canContinue = state && dob.length === 10;

            return (
                <main className="flex flex-col flex-1 bg-[#FAFAFA] overflow-hidden relative">
                    <div className="flex-1 overflow-y-auto px-5 pt-6 pb-8 doc-scroll">
                        <h2 className="text-[24px] font-bold text-gray-900 leading-snug mb-5">Help us confirm your coverage</h2>

                        {/* State of residence */}
                        <div className="mb-5">
                            <label className="block text-[16px] font-semibold text-gray-900 mb-2">State of residence</label>
                            <div className="relative">
                                <select
                                    value={state}
                                    onChange={e => setState(e.target.value)}
                                    className="w-full appearance-none bg-white border border-gray-200 rounded-xl px-4 h-[44px] text-[16px] outline-none focus:ring-2 focus:ring-brand-purple shadow-sm text-gray-900"
                                    style={{ color: state ? '#111827' : '#ACACAC' }}
                                >
                                    <option value="" disabled hidden>Select your state</option>
                                    {US_STATES.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <div className="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2">
                                    <Icon name="expand_more" className="text-gray-400 text-[20px]" />
                                </div>
                            </div>
                        </div>

                        {/* Date of birth */}
                        <div className="mb-5">
                            <label className="block text-[16px] font-semibold text-gray-900 mb-2">Date of birth</label>
                            <input
                                type="text"
                                inputMode="numeric"
                                value={dob}
                                onChange={e => setDob(formatDob(e.target.value))}
                                placeholder="MM/DD/YYYY"
                                className="w-full bg-white border border-gray-200 rounded-xl px-4 h-[44px] text-[16px] outline-none focus:ring-2 focus:ring-brand-purple shadow-sm"
                            />
                        </div>

                        {/* Why are we asking this? */}
                        <button onClick={() => setShowWhy(true)} className="flex items-center gap-2 text-[#5200D4] text-[16px] font-semibold underline underline-offset-2 active:opacity-70 transition-opacity">
                            <Icon name="help" className="text-[#5200D4] text-[20px]" filled={true} />
                            Why are we asking this?
                        </button>
                    </div>

                    {/* HIPAA footer */}
                    <HipaaFooter />

                    {/* Continue */}
                    <div className="px-5 pb-6 bg-gradient-to-b from-transparent to-[#F5F5F5] shrink-0">
                        <button
                            onClick={() => canContinue && onContinue(state, dob)}
                            disabled={!canContinue}
                            className="w-full bg-[#5200D4] text-white font-bold text-[16px] py-4 rounded-xl disabled:opacity-50 active:scale-[0.98] transition-all shadow-sm"
                        >
                            Continue
                        </button>
                    </div>

                    {/* Why modal */}
                    {showWhy && (
                        <div className="fixed inset-0 z-[120] flex justify-center items-center bg-black/40 backdrop-blur-sm px-4" onClick={() => setShowWhy(false)}>
                            <div className="relative w-full max-w-[400px] bg-white rounded-[28px] p-8 shadow-2xl text-center" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowWhy(false)} className="absolute top-4 right-4 text-gray-400 p-1"><Icon name="close" /></button>
                                <div className="w-16 h-16 bg-brand-lightPurple rounded-full flex items-center justify-center mx-auto mb-6 text-brand-purple">
                                    <Icon name="verified_user" className="text-[32px]" />
                                </div>
                                <h2 className="text-xl font-bold mb-4 text-gray-900 leading-tight">Why we ask for this</h2>
                                <p className="text-gray-600 text-[15px] leading-relaxed mb-3">We use your state of residence and date of birth to verify your insurance eligibility and confirm your coverage with UnitedHealthcare.</p>
                                <p className="text-gray-600 text-[15px] leading-relaxed">This information is never shared without your consent and is protected under HIPAA.</p>
                            </div>
                        </div>
                    )}
                </main>
            );
        };

        const EligibilityScreen = ({ onContinue }) => {
            const [isVisible, setIsVisible] = useState(false);
            const firstName = localStorage.getItem('boldFirstName') || 'Kathleen';
            const lastName = localStorage.getItem('boldLastName') || 'K';
            const displayName = firstName + (lastName ? ' ' + lastName.charAt(0).toUpperCase() + '.' : '');
            useEffect(() => {
                const timer = setTimeout(() => setIsVisible(true), 400);
                return () => clearTimeout(timer);
            }, []);

            return (
                <main className="flex flex-col flex-1 bg-white overflow-hidden">
                    <div className="flex-1 px-5 pt-6">
                        <h2 className="text-[32px] font-bold text-gray-900 leading-tight mb-3">You are covered!</h2>
                        <p className="text-[15px] text-gray-700 leading-relaxed mb-8">UHC offers $0 copay for patients to talk with in-network telehealth providers, which includes Bold clinicians. <a href="#" className="text-blue-600 underline font-medium">Learn more</a></p>
                        <div className="relative bg-[#F0FDF4] border-[1.5px] border-[#13C296] rounded-2xl p-6 shadow-sm overflow-hidden h-[210px]">
                            <div className="flex justify-between items-start mb-8">
                                <span className="text-[#0D9488] font-bold text-[18px] tracking-tight">UnitedHealthcare</span>
                            </div>
                            <div className={`space-y-1 transition-all duration-700 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                                <h3 className="text-[28px] font-bold text-gray-900">{displayName}</h3>
                                <div className="flex flex-col">
                                    <span className="text-[13px] text-gray-500 font-medium uppercase tracking-wider">Member ID:</span>
                                    <span className="text-[16px] text-gray-900 font-semibold tracking-wide">*********789</span>
                                </div>
                            </div>
                            <div className={`absolute bottom-5 right-5 transition-all duration-1000 delay-300 ${isVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-50'}`}>
                                <Icon name="verified" className="text-[#13C296] text-[48px]" filled={true} />
                            </div>
                        </div>
                    </div>
                    <div className="shrink-0 px-5 pt-4 pb-6 bg-white relative z-10 border-t border-gray-50">
                        <button onClick={onContinue} className="w-full bg-[#5200D4] text-white font-bold text-[16px] py-4 rounded-xl active:scale-[0.98] transition-all shadow-sm">Continue</button>
                    </div>
                </main>
            );
        };

        const IntakeFocusScreen = ({ selectedAreas, onToggle, onContinue }) => {
            const options = ["Energy and fatigue", "Weight management", "Nutrition and healthy eating", "Sleep and recovery", "Physical activity", "Stress management and mood", "General healthy aging"];
            return (
                <main className="flex flex-col flex-1 bg-white overflow-hidden">
                    <div className="flex-1 overflow-y-auto px-5 pt-6 pb-8 doc-scroll">
                        <h2 className="text-[24px] font-bold text-gray-900 leading-snug mb-1">Which areas would you like to focus on?</h2>
                        <p className="text-[15px] text-gray-700 mb-6">Select all that apply.</p>
                        <div className="space-y-3">
                            {options.map((opt, idx) => {
                                const isSelected = selectedAreas.includes(opt);
                                return (
                                    <button key={idx} onClick={() => onToggle(opt)} className={`w-full flex items-center gap-3 p-4 border rounded-xl transition-all text-left ${isSelected ? 'border-[#5200D4] bg-[#F3E8FF]/30' : 'border-gray-200 bg-white hover:border-gray-300'}`}>
                                        <div className={`shrink-0 relative flex items-center justify-center w-5 h-5 rounded-[4px] border ${isSelected ? 'bg-[#5200D4] border-[#5200D4]' : 'border-gray-300 bg-white'}`}>
                                            {isSelected && <Icon name="check" className="text-white text-[16px] absolute" />}
                                        </div>
                                        <span className={`text-[14px] leading-snug ${isSelected ? 'font-bold text-[#5200D4]' : 'text-gray-800 font-medium'}`}>{opt}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    <div className="shrink-0 px-5 pt-4 pb-6 bg-white border-t border-gray-50">
                        <button onClick={onContinue} disabled={selectedAreas.length === 0} className="w-full bg-[#5200D4] text-white font-bold py-4 rounded-xl disabled:opacity-50 active:scale-[0.98] transition-all shadow-sm">Continue</button>
                    </div>
                </main>
            );
        };

        const PrimaryFocusScreen = ({ options, selectedPrimary, onSelect, onContinue }) => {
            return (
                <main className="flex flex-col flex-1 bg-white overflow-hidden">
                    <div className="flex-1 overflow-y-auto px-5 pt-6 pb-8 doc-scroll">
                        <h2 className="text-[24px] font-bold text-gray-900 leading-snug mb-2">Of the areas you selected, which one is most important to you right now?</h2>
                        <p className="text-[15px] text-gray-700 mb-6">Choose one to help us personalize your first visit.</p>
                        <div className="space-y-3">
                            {options.map((opt, idx) => {
                                const isSelected = selectedPrimary === opt;
                                return (
                                    <button key={idx} onClick={() => onSelect(opt)} className={`w-full flex items-center gap-3 p-4 border rounded-xl transition-all text-left ${isSelected ? 'border-[#5200D4] bg-[#F3E8FF]/30' : 'border-gray-200 bg-white hover:border-gray-300'}`}>
                                        <div className={`shrink-0 relative flex items-center justify-center w-5 h-5 rounded-full border ${isSelected ? 'border-[#5200D4]' : 'border-gray-300 bg-white'}`}>
                                            {isSelected && <div className="w-2.5 h-2.5 rounded-full bg-[#5200D4]" />}
                                        </div>
                                        <span className={`text-[14px] leading-snug ${isSelected ? 'font-bold text-[#5200D4]' : 'text-gray-800 font-medium'}`}>{opt}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    <div className="px-5 pb-6 bg-white border-t border-gray-50">
                        <button onClick={onContinue} disabled={!selectedPrimary} className="w-full bg-[#5200D4] text-white font-bold py-4 rounded-xl disabled:opacity-50 active:scale-[0.98] transition-all">Continue</button>
                    </div>
                </main>
            );
        };

        const ConcernScreen = ({ focusArea, initialValue, onContinue, onSkip }) => {
            const [text, setText] = useState(initialValue || '');

            return (
                <main className="flex flex-col flex-1 bg-white overflow-hidden">
                    <div className="flex-1 overflow-y-auto px-6 pt-6 pb-4 doc-scroll">
                        <h2 className="text-[24px] font-bold text-gray-900 leading-snug mb-2 pr-4">What's the one thing you most want to discuss with your clinician about {focusArea}?</h2>
                        <p className="text-[15px] text-gray-700 mb-8 leading-relaxed">This helps your clinician focus the visit on what matters most to you.</p>
                        
                        <div className="relative border border-gray-300 rounded-2xl overflow-hidden focus-within:ring-2 focus-within:ring-brand-purple transition-all shadow-sm">
                            <textarea 
                                value={text} 
                                onChange={(e) => setText(e.target.value)} 
                                placeholder="What would you like to talk about further?" 
                                maxLength={2000} 
                                className="w-full h-[220px] p-5 text-[16px] text-gray-900 placeholder-[#A3A3A3] outline-none resize-none bg-white" 
                            />
                            <div className="absolute bottom-4 left-5 text-[12px] text-gray-400 font-medium">
                                {text.length}/2000
                            </div>
                        </div>

                    </div>

                    <div className="px-5 pt-4 pb-6 bg-white shrink-0">
                        <HipaaFooter />

                        <button 
                            onClick={() => onContinue(text)} 
                            disabled={text.trim().length === 0} 
                            className="w-full bg-[#5200D4] text-white font-bold py-4 rounded-xl disabled:opacity-50 active:scale-[0.98] transition-all shadow-sm mb-3"
                        >
                            Continue
                        </button>
                        <button onClick={onSkip} className="w-full py-2 text-[15px] font-bold text-gray-900 hover:text-gray-600 transition-all">Skip</button>
                    </div>
                </main>
            );
        };

        const IntakeScreen = ({ onContinue }) => {
            const [selected, setSelected] = useState([]);
            const options = ["Weight-loss surgery in the past year", "Stage 4 or 5 kidney disease", "Ongoing treatment for cancer", "Challenges with alcohol or drug use", "Eating disorder history", "Currently pregnant or breastfeeding", "None of the above"];
            const toggle = (o) => {
                if (o === 'None of the above') setSelected(['None of the above']);
                else {
                    let next = selected.filter(x => x !== 'None of the above');
                    if (next.includes(o)) next = next.filter(x => x !== o);
                    else next.push(o);
                    setSelected(next);
                }
            };
            return (
                <main className="flex flex-col flex-1 bg-white overflow-hidden">
                    <div className="flex-1 overflow-y-auto px-5 pt-6 pb-8 doc-scroll">
                        <h2 className="text-[24px] font-bold text-gray-900 leading-snug mb-1">Do any of the following apply to you?</h2>
                        <p className="text-[15px] text-gray-700 mb-6">Select all that apply.</p>
                        <div className="space-y-3">
                            {options.map((o, i) => (
                                <button key={i} onClick={() => toggle(o)} className={`w-full flex items-center gap-3 p-4 border rounded-xl transition-all text-left ${selected.includes(o) ? 'border-[#5200D4] bg-[#F3E8FF]/30' : 'border-gray-200 bg-white'}`}>
                                    <div className={`shrink-0 flex items-center justify-center w-5 h-5 rounded-[4px] border ${selected.includes(o) ? 'bg-[#5200D4] border-[#5200D4]' : 'border-gray-300 bg-white'}`}>
                                        {selected.includes(o) && <Icon name="check" className="text-white text-[16px]" />}
                                    </div>
                                    <span className="text-[14px] text-gray-800">{o}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="px-5 pt-4 pb-6 bg-white border-t border-gray-50">
                        <button onClick={() => onContinue(selected)} disabled={selected.length === 0} className="w-full bg-[#5200D4] text-white font-bold py-4 rounded-xl active:scale-[0.98] transition-all">Continue</button>
                    </div>
                </main>
            );
        };

        const LoaderScreen = ({ focusArea, onFinish }) => {
            const [step, setStep] = useState(0);
            useEffect(() => {
                const timers = [
                    setTimeout(() => setStep(1), 600),
                    setTimeout(() => setStep(2), 1400),
                    setTimeout(() => setStep(3), 2400),
                    setTimeout(() => onFinish(), 3400)
                ];
                return () => timers.forEach(t => clearTimeout(t));
            }, [onFinish]);
            return (
                <main className="flex flex-col flex-1 bg-white px-8 pt-[120px] h-screen">
                    <h2 className="text-[28px] font-bold text-gray-900 leading-tight mb-12">Matching you with the right Bold Care Clinician</h2>
                    <div className="space-y-6">

                            <h3 className="font-semibold text-gray-800 text-[15px]">Our Privacy Obligations</h3>
                            <p>The law requires us to maintain the privacy of certain health information called "Protected Health Information" or "PHI". Protected Health Information is the information that you provide us or that we create or receive about your health care. The law also requires us to provide you with this Notice of our legal duties and privacy practices. When we use or disclose (share) your Protected Health Information, we are required to follow the terms of this Notice or other notice in effect at the time we use or share the PHI. Finally, the law provides you with certain rights described in this Notice. Furthermore, we are required to notify you following a breach of unsecured PHI.</p>

                            <p className="font-semibold text-gray-800">Uses and Disclosures for Treatment, Payment and Health Care Operations</p>
                            <p>We may use and share your PHI to provide "Treatment," obtain "Payment" for your Treatment, and perform our "Health Care Operations." These three terms are defined as:</p>

                            <p>• <strong>Business Associates.</strong> In addition, we may share PHI with certain others who help us with our activities, including those we hire to perform services. All such Business Associates are required to sign an agreement that protects your PHI.</p>
                            <p className="font-semibold text-gray-800">Your Other Health Care Providers</p>

                            <p className="font-semibold text-gray-800">Disclosure to Relatives, Close Friends and Your Other Caregivers</p>

                            <p className="font-semibold text-gray-800">Public Health Activities</p>
                            <p>We are required or are permitted by law to report PHI to certain government agencies and others. For example, we may share your PHI to report health information to public health authorities, to report abuse and neglect, to report information about products and services to the U.S. Food and Drug Administration, and to prevent or lessen a serious and imminent threat to a person or the public's health or safety.</p>

                            <p className="font-semibold text-gray-800">Judicial and Administrative Proceedings</p>

                            <p>Medical Services Patient Warning. Patient understands and agrees that email and the internet should never be used to access medical care in the event of an emergency. Patient agrees that in such situations they shall call 911 or the nearest emergency medical assistance provider.</p>
                            <p className="font-semibold text-gray-800">Informed Consent — Background on Telemedicine</p>

                            <p>All Clinicians that provide Medical Services on the Age Bold platform hold professional licenses issued by the professional licensing boards in the states where they practice. You can report a complaint relating to services provided by any Clinician by contacting the professional licensing board in the state where the services were received.</p>
                            <p>You can find the contact information for each of the state professional licensing boards governing medicine on the Federation of State Medical Boards website at: <span className="text-brand-purple underline">fsmb.org/state-medical-boards/contacts</span></p>
                            <p>Any patient medical records created as a result of your use of the site will be securely maintained by the Practice for a period that is no less than the minimum number of years such records are required to be maintained under state and federal law.</p>
                            <p>Please report any violations of these New Patient Agreement and Informed Consent to: <span className="text-brand-purple underline">privacy@agebold.com</span></p>
                        </div>}
                    />}
                    
                    {view === 'phoneNumber' && <PhoneNumberScreen onContinue={() => setView('appointmentReserved')} />}
                    
                    {view === 'appointmentReserved' && <AppointmentReservedScreen callType={callType} onViewProfile={() => setIsProfileOpen(true)} />}

                    {/* Modals */}
                    {isProfileOpen && (
                        <ProviderProfileModal
                            onClose={() => setIsProfileOpen(false)}
                            onWorkWith={() => { setIsProfileOpen(false); setView('schedule'); }}
                        />
                    )}

                    {isFaq1Open && (
                        <div className="fixed inset-0 z-[120] flex justify-center items-center bg-black/40 backdrop-blur-sm px-4">
                            <div className="relative w-full max-w-[360px] bg-white rounded-[28px] p-8 shadow-2xl text-center">
                                <button onClick={() => setIsFaq1Open(false)} className="absolute top-4 right-4 text-gray-400 p-1"><Icon name="close" /></button>
                                <div className="w-16 h-16 bg-brand-lightPurple rounded-full flex items-center justify-center mx-auto mb-6 text-brand-purple"><Icon name="volunteer_activism" className="text-[32px]" /></div>
                                <h2 className="text-xl font-bold mb-4 text-gray-900 leading-tight">Learn more about your Care Clinician</h2>
                                <p className="text-gray-600 text-[15px] leading-relaxed mb-4">Bold Care helps match you with the best care clinician based on your focus, so you can achieve your goal more easily.</p>
                                <p className="text-gray-600 text-[15px] leading-relaxed">You can choose to switch care clinicians if you find it's not a good fit after your first visit. All are in your control.</p>
                            </div>
                        </div>
                    )}

                    {isFaq2Open && (
                        <div className="fixed inset-0 z-[120] flex justify-center items-center bg-black/40 backdrop-blur-sm px-4">
                            <div className="relative w-full max-w-[360px] bg-white rounded-[28px] p-8 shadow-2xl text-center">
                                <button onClick={() => setIsFaq2Open(false)} className="absolute top-4 right-4 text-gray-400 p-1"><Icon name="close" /></button>
                                <div className="w-16 h-16 bg-brand-lightPurple rounded-full flex items-center justify-center mx-auto mb-6 text-brand-purple"><Icon name="groups" className="text-[32px]" /></div>
                                <h2 className="text-xl font-bold mb-4 text-gray-900 leading-tight">Bold Care complements your primary care</h2>
                                <p className="text-gray-600 text-[15px] leading-relaxed mb-6">Bold care providers assist you with nutrition, exercise, sleep, and the development of healthy habits, all aimed at improving your well-being <strong>without additional medications.</strong></p>
                                <div className="mb-2 text-sm font-bold text-brand-purple underline">Call us (424) 577-5266</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
